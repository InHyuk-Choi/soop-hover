<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      background: transparent;
    }

    .box {
      width: 100%;
      max-width: 800px;
    }

    #photo {
      width: 100%;
      display: block;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="box">
    <img id="photo" src="./before.png">
  </div>

  <audio
    id="cameraSound"
    src="./camera.mp3"
    preload="auto">
  </audio>


  <script>
    const photo = document.getElementById("photo");
    const cameraSound = document.getElementById("cameraSound");

    let changed = false;

    photo.addEventListener("click", async () => {

      // 찰칵 소리
      cameraSound.currentTime = 0;

      try {
        await cameraSound.play();
      } catch (error) {
        console.log("소리 재생 실패:", error);
      }

      // 사진 변경
      if (!changed) {
        photo.src = "./after.png";
        changed = true;
      } else {
        photo.src = "./before.png";
        changed = false;
      }

    });
  </script>

</body>
</html>
