<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <style>
    body {
      margin: 0;
      background: transparent;
    }

    .box {
      position: relative;
      width: 100%;
      max-width: 800px;
    }

    .box img {
      width: 100%;
      display: block;
    }

    .overlay {
      position: absolute;
      left: 0;
      top: 0;
      transition: opacity 0.3s;
      cursor: pointer;
    }

    .overlay:hover {
      opacity: 0;
    }
  </style>
</head>

<body>

  <div class="box">
    <img src="./after.png">

    <img
      id="overlay"
      class="overlay"
      src="./before.png"
    >
  </div>

  <audio
    id="cameraSound"
    src="./camera.mp3"
    preload="auto">
  </audio>

  <script>
    const overlay = document.getElementById("overlay");
    const cameraSound = document.getElementById("cameraSound");

    overlay.addEventListener("click", async () => {
      try {
        cameraSound.currentTime = 0;
        await cameraSound.play();
        console.log("찰칵 소리 재생 성공");
      } catch (error) {
        console.log("소리 재생 실패:", error);
      }
    });
  </script>

</body>
</html>
