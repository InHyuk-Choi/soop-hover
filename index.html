<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      background: transparent;
    }

    .box {
      width: 100%;
      max-width: 800px;
    }

    #photo {
      width: 100%;
      display: block;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="box">
    <img id="photo" src="./before.png">
  </div>

  <audio id="cameraSound" src="./camera.mp3" preload="auto"></audio>

  <script>
    const photo = document.getElementById("photo");
    const sound = document.getElementById("cameraSound");

    let isAfter = false;

    photo.addEventListener("click", () => {
      sound.currentTime = 0;
      sound.play();

      isAfter = !isAfter;

      photo.src = isAfter
        ? "./after.png"
        : "./before.png";
    });
  </script>

</body>
</html>
